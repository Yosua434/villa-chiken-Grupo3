<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | Villa Chicken</title>

    <link rel="stylesheet" href="./CSS/carro.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRO9hkJS3hRmxY6WrNFT_kaqO4zJeU2J3zwsw&s">

        <span>Villa Chicken</span>

    </div>

    <nav>

        <a href="./index.html">Inicio</a>

        <a href="./productos.html">Productos</a>

        <a href="./carrito.html">
            <i class="fa-solid fa-cart-shopping"></i>
            Carrito
        </a>

        <a href="./login.html">Login</a>

    </nav>

</header>

<section class="contenedor-carrito">

    <div class="productos">

        <h1>Resumen del Pedido</h1>

        <div class="producto">

            <img src="https://images.unsplash.com/photo-1600891964092-4316c288032e">

            <div>

                <h3>Pollo a la Brasa</h3>

                <p>Cantidad: 1</p>

                <h2>S/ 45.00</h2>

            </div>

        </div>

        <div class="producto">

            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">

            <div>

                <h3>Hamburguesa Especial</h3>

                <p>Cantidad: 2</p>

                <h2>S/ 30.00</h2>

            </div>

        </div>

    </div>

    <div class="pago">

        <h2>Resumen de Pago</h2>

        <div class="detalle">
            <span>Subtotal</span>
            <span>S/ 75</span>
        </div>

        <div class="detalle">
            <span>Delivery</span>
            <span>S/ 5</span>
        </div>

        <div class="detalle total">
            <span>Total</span>
            <span>S/ 80</span>
        </div>

        <h3>Métodos de Pago</h3>

        <div class="metodos">

            <div class="metodo">
                <i class="fa-brands fa-cc-visa"></i>
                Visa
            </div>

            <div class="metodo">
                <i class="fa-solid fa-mobile-screen"></i>
                Yape
            </div>

            <div class="metodo">
                <i class="fa-brands fa-cc-mastercard"></i>
                Mastercard
            </div>

        </div>

        <button class="btn-pagar">
            Finalizar Compra
        </button>

    </div>

</section>

<footer>
    <p>© 2026 Villa Chicken</p>
</footer>

</body>
</html>
